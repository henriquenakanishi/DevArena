<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title> DevArena | Cadastro </title>
  <link rel="icon" href="assets/imgs/Favicon.png" type="image/png">
  <link rel="stylesheet" href="styles/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;600;700&display=swap" rel="stylesheet">

</head>

<body>
  <header>
    <nav class="navbar container">
      <div class="logo">
        <a href="index.html">
          <img src="assets/imgs/DevArena.png" alt="DevArena">
        </a>
      </div>
      <ul class="menu">
        <li><a href="index.html">Início</a></li>
        <li><a href="index.html#historia">Sobre nós</a></li>
        <li><a href="ranking.html">Ranking</a></li>
      </ul>
      <a href="login.html" class="btn-login">Login</a>
    </nav>
  </header>

  <div class="auth">
    <div class="auth-content">
      <h2>Seja bem-vindo a DevArena 🥷 </h2> <br>
      <div class="formulario">
        <div class="field">
          <span>Nome:</span>
          <input id="nome_input" type="text" placeholder="Nome Completo" />
        </div>
        <div class="field">
          <span>E-mail:</span>
          <input id="email_input" type="text" placeholder="email@provedor.com" />
        </div>
        <div class="field">
          <span>Senha:</span>
          <input id="senha_input" type="password" placeholder="******" />
        </div>
        <div class="field">
          <span>Confirmação da Senha:</span>
          <input id="confirmacao_senha_input" type="password" placeholder="******" />
        </div>
        <button class="botao" onclick="validarCadastro()">Cadastrar</button>
      </div>
    </div>
  </div>
  </div>

  <footer class="footer">
    <p>© 2026 DevArena • Feito por Henrique Nakanishi</p>
  </footer>

</body>

</html>

<script>
  function validarCadastro() {
    var nome = nome_input.value;
    var email = email_input.value;
    var senha = senha_input.value;
    var confirmacao = confirmacao_senha_input.value;

    if (
      nome == "" ||
      email == "" ||
      senha == "" ||
      confirmacao == ""
    ) {
      alert("Preencha todos os campos!");
      return;
    }

    if (!email.includes("@") || !email.includes(".")) {
      alert("Digite um e-mail válido!");
      return;
    }

    if (senha.length < 6) {
      alert("A senha deve ter pelo menos 6 caracteres!");
      return;
    }

    if (senha != confirmacao) {
      alert("As senhas não coincidem!");
      return;
    }

    alert("Cadastro realizado com sucesso Dev 🥷");
    window.location = "./arena.html"
  }
</script>
