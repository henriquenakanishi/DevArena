<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title> DevArena | Cadastro </title>
  <link rel="icon" href="assets/imgs/Favicon.png" type="image/png">
  <link rel="stylesheet" href="styles/style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>
  <header>
    <nav class="navbar">

      <div class="nav-left">

        <a href="index.html" class="logo">
          <img src="assets/imgs/DevArenaNavbar.png" alt="DevArena">
        </a>

        <ul class="menu">
          <li>
            <a href="index.html" title="Início">
              <i data-lucide="house"></i>
            </a>
          </li>

          <li>
            <a href="historia.html" title="Sobre">
              <i data-lucide="info"></i>
            </a>
          </li>

          <li>
            <a href="ranking.html" title="Ranking">
              <i data-lucide="crown"></i>
            </a>
          </li>
        </ul>

      </div>
    </nav>
  </header>

  <div class="auth">
    <div class="auth-content">
      <h2>Seja bem-vindo a <span> DevArena! </span> </h2> <br>
      <div class="formulario">
        <div class="field">
          Nome:
          <input id="nome_input" type="text" placeholder="Nome Completo" />
        </div>
        <div class="field">
          E-mail:
          <input id="email_input" type="text" placeholder="email@provedor.com" />
        </div>
        <div class="field">
          Senha:
          <input id="senha_input" type="password" placeholder="******" />
        </div>
        <div class="field">
          Confirmação da Senha:
          <input id="confirmacao_senha_input" type="password" placeholder="******" />
        </div>
        <p class="redirect-login">
          Já tem uma conta?
          <a href="login.html"><span>Faça login</span></a>
        </p>
        <button class="botao" onclick="validarCadastro()">Cadastrar</button>

      </div>
    </div>
  </div>
  </div>

  <!-- FOOTER COM ÍCONES -->
  <footer class="footer">
    <div class="footer-icons">
      <a href="https://github.com/henriquenakanishi/DevArena" target="_blank"> <i class="fa-brands fa-github"></i></a>
      <a href="https://www.linkedin.com/in/hpnakanishi/" target="_blank"> <i class="fa-brands fa-linkedin"></i></a>
      <a href="mailto:contato@devarena.com"> <i class="fa-solid fa-envelope"></i></a>
    </div>

    <p>© 2026 DevArena • Feito por Henrique Nakanishi</p>
  </footer>

  <script>lucide.createIcons();</script>

  <script>
    function validarCadastro() {
      var nome = nome_input.value;
      var email = email_input.value;
      var senha = senha_input.value;
      var confirmacao = confirmacao_senha_input.value;

      if (nome == "" || email == "" || senha == "" || confirmacao == "") {
        alert("Preencha todos os campos!");
        return;
      }

      if (!email.includes("@") || !email.includes(".")) {
        alert("Digite um e-mail válido!");
        return;
      }

      if (senha.length < 6) {
        alert("A senha deve ter pelo menos 6 caracteres!");
        return;
      }

      if (senha != confirmacao) {
        alert("As senhas não coincidem!");
        return;
      }

      fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          nomeServer: nome,
          emailServer: email,
          senhaServer: senha
        })
      })
        .then(function (resposta) {
          if (resposta.ok) {
            alert("Cadastro realizado com sucesso Dev 🥷");
            window.location = "login.html";
          } else {
            resposta.text().then(function (texto) {
              console.log(texto);
              alert("Erro ao cadastrar: " + texto);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
          alert("Erro ao conectar com o servidor.");
        });
    }
  </script>
</body>

</html>
