<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevArena | Ranking</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/imgs/Favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <header>
        <nav class="navbar container">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/imgs/DevArena.png" alt="DevArena">
                </a>
            </div>

            <ul class="menu">
                <li>
                    <a href="index.html" title="Início">
                        <i data-lucide="home"></i>
                    </a>
                </li>

                <li>
                    <a href="index.html#historia" title="Sobre nós">
                        <i data-lucide="info"></i>
                    </a>
                </li>

                <li>
                    <a href="ranking.html" title="Ranking" class="active">
                        <i data-lucide="crown"></i>
                    </a>
                </li>
            </ul>

            <a href="cadastro.html" class="btn-cadastro">
                <i data-lucide="user"></i>
            </a>
        </nav>
    </header>


    <main>

        <section class="ranking container">
            <h1>Ranking Global</h1>
            <p>Os melhores digitadores da DevArena</p>

            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>Posição</th>
                        <th>Jogador</th>
                        <th>WPM</th>
                        <th>Precisão</th>
                    </tr>
                </thead>

                <tbody id="tbody_ranking">
                    <tr class="top1">
                        <td>🥇 1</td>
                        <td>Nakanishi</td>
                        <td>145</td>
                        <td>99%</td>
                    </tr>

                    <tr class="top2">
                        <td>🥈 2</td>
                        <td>Jojima</td>
                        <td>138</td>
                        <td>98%</td>
                    </tr>

                    <tr class="top3">
                        <td>🥉 3</td>
                        <td>Pinheiro</td>
                        <td>132</td>
                        <td>97%</td>
                    </tr>

                    <tr>
                        <td>4</td>
                        <td>Justo</td>
                        <td>125</td>
                        <td>96%</td>
                    </tr>

                    <tr>
                        <td>5</td>
                        <td>Henrique</td>
                        <td>121</td>
                        <td>95%</td>
                    </tr>

                    <tr>
                        <td>6</td>
                        <td>Rodrigues</td>
                        <td>118</td>
                        <td>94%</td>
                    </tr>

                    <tr>
                        <td>7</td>
                        <td>Silva</td>
                        <td>115</td>
                        <td>93%</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <footer class="footer">
        <p>© 2026 DevArena • Ranking global</p>
    </footer>

</body>

</html>

<script>
    fetch("/resultado/ranking")
        .then(res => res.json())
        .then(lista => {
            var tbody = document.getElementById("tbody_ranking");

            tbody.innerHTML = "";

            for (var i = 0; i < lista.length; i++) {
                var jogador = lista[i];

                var medalha = i + 1;

                if (i == 0) {
                    medalha = "🥇 1";
                } else if (i == 1) {
                    medalha = "🥈 2";
                } else if (i == 2) {
                    medalha = "🥉 3";
                }

                tbody.innerHTML += `
                <tr class="${i == 0 ? "top1" : i == 1 ? "top2" : i == 2 ? "top3" : ""}">
                    <td>${medalha}</td>
                    <td>${jogador.nome}</td>
                    <td>${jogador.wpm}</td>
                    <td>${jogador.precisao}%</td>
                </tr>
            `;
            }
        });
</script>

<script>
    lucide.createIcons();
</script>
