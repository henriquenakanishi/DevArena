    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DevArena | Dashboard</title>
        <link rel="stylesheet" href="styles/style.css">
        <link rel="icon" href="assets/imgs/Favicon.png" type="image/png">
        <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
        
    </head>

    <body>

        <header>
        <nav class="navbar">

            <div class="nav-left">

                <a href="index.html" class="logo">
                    <img src="assets/imgs/DevArenaNavbar.png" alt="DevArena">
                </a>

                <ul class="menu">
                    <li>
                        <a href="#" title="Início">
                            <i data-lucide="house"></i>
                        </a>
                    </li>

                    <li>
                        <a href="historia.html" title="Sobre">
                            <i data-lucide="info"></i>
                        </a>
                    </li>

                    <li>
                        <a href="ranking.html" title="Ranking">
                            <i data-lucide="crown"></i>
                        </a>
                    </li>

                    <li>
                        <a href="arena.html" title="Arena">
                            <i data-lucide="play"></i>
                        </a>
                    </li>
                </ul>

            </div>
            <div class="nav-right">
                <div class="perfil-menu">
                    <button class="perfil-btn" onclick="abrirMenuPerfil()">
                        <i data-lucide="user"></i>
                    </button>

                    <div class="perfil-dropdown" id="perfilDropdown">
                        <p>Olá, <span id="nomeUsuario">Dev</span></p>

                        <a href="index.html">Home</a>
                        <a href="perfil.html">Perfil</a>
                        <a href="cps.html">CPS</a>
                        <a href="arena.html">Arena</a>
                        <a href="login.html" onclick="sair()">Sair</a>
                    </div>
                </div>
            </div>

        </nav>
        </header>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

    <h1>Dashboard DevArena</h1>

    <div>
        <h2 id="totalPartidas">0</h2>
        <p>Total de partidas</p>
    </div>

    <div>
        <h2 id="melhorWpm">0</h2>
        <p>Melhor WPM</p>
    </div>

    <div>
        <h2 id="mediaWpm">0</h2>
        <p>Média WPM</p>
    </div>

    <div>
        <h2 id="mediaPrecisao">0%</h2>
        <p>Média de precisão</p>
    </div>

    <script>
    function atualizarDashboard() {
        fetch("http://localhost:8080/resultado/resumo")
            .then(res => res.json())
            .then(dados => {
                totalPartidas.innerHTML = dados.totalPartidas || 0;
                melhorWpm.innerHTML = dados.melhorWpm || 0;
                mediaWpm.innerHTML = dados.mediaWpm || 0;
                mediaPrecisao.innerHTML = (dados.mediaPrecisao || 0) + "%";
            })
            .catch(erro => {
                console.log("Erro ao carregar dashboard:", erro);
            });
    }

    atualizarDashboard();
    setInterval(atualizarDashboard, 3000);
    </script>

    </body>
    </html>
