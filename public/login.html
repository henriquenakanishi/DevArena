<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title> DevArena | Login </title>
  <link rel="icon" href="assets/imgs/Favicon.png" type="image/png">
  <link rel="stylesheet" href="styles/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>
  <header>
    <nav class="navbar container">
      <div class="logo">
        <a href="index.html">
          <img src="assets/imgs/DevArena.png" alt="DevArena">
        </a>
      </div>

      <ul class="menu">
        <li>
          <a href="index.html" title="Início">
            <i data-lucide="home"></i>
          </a>
        </li>

        <li>
          <a href="index.html#historia" title="Sobre nós">
            <i data-lucide="info"></i>
          </a>
        </li>

        <li>
          <a href="ranking.html" title="Ranking">
            <i data-lucide="crown"></i>
          </a>
        </li>

        <li>
          <a href="arena.html" title="Arena">
            <i data-lucide="play"></i>
          </a>
        </li>
      </ul>

      <a href="cadastro.html" class="btn-cadastro">
        <i data-lucide="user-plus"></i>
      </a>
    </nav>
  </header>


    <div class="login">

      <div class="auth">
        <div class="auth-content">
          <h2>Bem-vindo de volta Dev 🥷 </h2> <br>
          <div class="formulario">
            <div class="field">
              <span>Email:</span>
              <input id="nome_input" type="text" placeholder="email@provedor.com" />
            </div>
            <div class="field">
              <span>Senha:</span>
              <input id="senha_input" type="password" placeholder="******" />
            </div>
            <button class="btn">Login</button>
          </div>
        </div>
      </div>
    </div>

    <!--footer inicio-->
    <footer class="footer">
      <p>© 2026 DevArena • Feito por Henrique Nakanishi</p>
    </footer>

    <script>
      lucide.createIcons();
    </script>

  <script>
  function validarLogin() {
    var email = nome_input.value;
    var senha = senha_input.value;

    if (email == "" || senha == "") {
      alert("Preencha todos os campos!");
      return;
    }

    if (!email.includes("@") || !email.includes(".")) {
      alert("Digite um e-mail válido!");
      return;
    }

    if (senha.length < 6) {
      alert("A senha deve ter pelo menos 6 caracteres!");
      return;
    }

    alert("Login realizado com sucesso!");
    window.location = "./arena.html"
  }
  </script>
</body>
</html>
