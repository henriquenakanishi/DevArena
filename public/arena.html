<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevArena | Arena</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/imgs/Favicon.png" type="image/png">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->

    <header>

        <nav class="navbar">

            <div class="nav-left">

                <a href="index.html" class="logo">
                    <img src="assets/imgs/DevArenaNavbar.png" alt="DevArena">
                </a>

                <ul class="menu">

                    <li>
                        <a href="index.html" title="Início">
                            <i data-lucide="house"></i>
                        </a>
                    </li>

                    <li>
                        <a href="historia.html" title="Sobre">
                            <i data-lucide="info"></i>
                        </a>
                    </li>

                    <li>
                        <a href="ranking.html" title="Ranking">
                            <i data-lucide="crown"></i>
                        </a>
                    </li>

                </ul>

            </div>

            <div class="nav-right">

                <div class="perfil-menu">

                    <button class="perfil-btn" onclick="abrirMenuPerfil()">
                        <i data-lucide="user"></i>
                    </button>

                    <div class="perfil-dropdown" id="perfilDropdown">

                        <p>
                            Olá,
                            <span id="nomeUsuario">Dev</span>
                        </p>

                        <a href="index.html">Home</a>
                        <a href="arena.html">Arena</a>
                        <a href="perfil.html">Perfil</a>
                        <a href="ranking.html">Ranking</a>

                        <a href="login.html" onclick="sair()">
                            Sair
                        </a>

                    </div>

                </div>

            </div>

        </nav>

    </header>

    <!-- MAIN -->

    <main class="arena-hub container">

        <h1>
            Escolha sua <span>Arena</span>
        </h1>

        <section class="modes">

            <a href="arenatyping.html" class="mode-card">

                <i data-lucide="keyboard"></i>

                <h2>Arena Typing</h2>

                <p>
                    Treine velocidade, precisão e consistência na digitação.
                </p>

            </a>

            <a href="arenacps.html" class="mode-card">

                <i data-lucide="mouse-pointer-click"></i>

                <h2>Arena CPS</h2>

                <p>
                    Teste seus reflexos e descubra seus cliques por segundo.
                </p>

            </a>

        </section>

    </main>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-icons">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-solid fa-envelope"></i></a>
        </div>

        <p>
            © 2026 DevArena • Feito por Henrique Nakanishi
        </p>

    </footer>

    <!-- SCRIPT -->

    <script>

        function abrirMenuPerfil() {

            var menu = document.getElementById("perfilDropdown");

            if (menu.style.display == "flex") {
                menu.style.display = "none";
            } else {
                menu.style.display = "flex";
            }

        }

        if (sessionStorage.NOME_USUARIO != undefined) {
            nomeUsuario.innerHTML = sessionStorage.NOME_USUARIO;
        }

        function sair() {
            sessionStorage.clear();
        }

        lucide.createIcons();

    </script>

</body>

</html>
